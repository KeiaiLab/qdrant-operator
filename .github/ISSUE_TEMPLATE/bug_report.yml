name: Bug report
description: Create a report to help us improve the Qdrant Operator
title: '[BUG] '
labels: ['bug', 'triage']
assignees: ''
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
        Before creating an issue, please search existing issues to avoid duplicates.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      description: Please confirm the following before submitting
      options:
        - label: I have searched existing issues
          required: true
        - label: I can reproduce this issue in a clean environment
          required: true
        - label: This is not a security vulnerability (use the [Security Policy](https://github.com/keiailab/qdrant-operator/security/policy) for security issues)

  - type: dropdown
    id: kubernetes_version
    attributes:
      label: Kubernetes Version
      description: Which Kubernetes version are you using? (the chart requires 1.29+)
      options:
        - '1.29'
        - '1.30'
        - '1.31'
        - '1.32'
        - 'Other (specify below)'
    validations:
      required: true

  - type: input
    id: kubernetes_version_other
    attributes:
      label: Kubernetes Version (if Other)
      description: Please specify your Kubernetes version
      placeholder: e.g., 1.33.0

  - type: dropdown
    id: qdrant_version
    attributes:
      label: Qdrant Version
      description: Which Qdrant image version are you deploying?
      options:
        - '1.18'
        - '1.17'
        - '1.16'
        - 'Other (specify below)'
    validations:
      required: true

  - type: input
    id: qdrant_version_other
    attributes:
      label: Qdrant Version (if Other)
      description: Please specify your Qdrant version
      placeholder: e.g., v1.18.2

  - type: dropdown
    id: operator_version
    attributes:
      label: Qdrant Operator Version
      description: Which version of the Qdrant Operator are you using?
      options:
        - 'v0.6.0'
        - 'Other (specify below)'
    validations:
      required: true

  - type: input
    id: operator_version_other
    attributes:
      label: Operator Version (if Other)
      description: Please specify the operator version
      placeholder: e.g., latest, commit hash

  - type: input
    id: cluster_type
    attributes:
      label: Cluster Type
      description: What kind of Qdrant deployment are you running?
      placeholder: e.g., Standalone, Distributed (Raft cluster)

  - type: dropdown
    id: installation_method
    attributes:
      label: Installation Method
      description: How did you install the operator?
      options:
        - Helm
        - Manual (kubectl apply)
        - From source (make deploy)
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description of the Bug
      description: A clear and concise description of what the bug is
      placeholder: e.g., The operator fails to reconcile the StatefulSet when TLS is enabled...
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Install the operator using helm: `helm install ...`
        2. Create a QdrantCluster with this YAML...
        3. Apply the manifest: `kubectl apply -f ...`
        4. Observe the error...
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected Behavior
      description: A clear description of what you expected to happen
      placeholder: e.g., The distributed cluster should reach 3 ready peers
    validations:
      required: true

  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual Behavior
      description: A clear description of what actually happened
      placeholder: e.g., The pods get stuck in Pending state with CrashLoopBackOff
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs, Metrics, or Screenshots
      description: Please provide relevant logs, metrics output, or screenshots to help diagnose the issue
      placeholder: |
        - Operator logs: `kubectl logs -n qdrant-operator-system deployment/qdrant-operator-controller-manager`
        - Pod logs: `kubectl logs -n <namespace> <pod-name>`
        - Pod status: `kubectl describe pod <pod-name>`
        - CR status: `kubectl get qdrantcluster <name> -o yaml`
      render: shell

  - type: textarea
    id: yaml_config
    attributes:
      label: Relevant YAML Configuration
      description: Provide the QdrantCluster resource YAML (remove sensitive data)
      render: yaml

  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
      description: Add any other context about the problem here
      placeholder: e.g., Running on EKS, using custom storage class, related to scaling operations...

  - type: markdown
    attributes:
      value: |
        ---
        **Note:** Please ensure all sensitive data (passwords, tokens, keys) are redacted before submitting.
