# kube-linter configuration for qdrant-operator
# Reference: https://docs.kubelinter.io/

checks:
  doNotAutoAddDefaults: false
  exclude:
    # The operator legitimately requires cluster-scoped RBAC
    # (ClusterRole + binding) to reconcile QdrantCluster resources
    # across namespaces, so this ownership antipattern check does not
    # apply to the operator's own control-plane manifests.
    - cluster-admin-role-binding
    # The chart ships a human-facing QdrantCluster admin *aggregation*
    # ClusterRole (deploy/chart/templates/rbac.yaml) whose full-verb
    # grant is the upstream kubebuilder design for admin roles; the
    # operator itself never uses it.
    - wildcard-in-rules
  include:
    # Production-grade defaults that should hold across every
    # rendered manifest of the chart.
    - dangling-service
    - default-service-account
    - deprecated-service-account-field
    - drop-net-raw-capability
    - duplicate-env-var
    - env-var-secret
    - exposed-services
    - host-ipc
    - host-network
    - host-pid
    - latest-tag
    - liveness-port
    - mismatching-selector
    - no-anti-affinity
    - no-extensions-v1beta
    - no-liveness-probe
    - no-read-only-root-fs
    - no-readiness-probe
    - non-existent-service-account
    - privilege-escalation-container
    - privileged-container
    - privileged-ports
    - readiness-port
    # required-annotation-email / required-label-owner are deferred
    # until chart v0.7.0 introduces the sibling `ownership.*` values
    # (owner label + email annotation on the controller Deployment,
    # as in valkey-operator). Re-enable both together with that
    # release — the current chart (v0.6.0, consumed live by Flux)
    # must not change its rendered output in a docs/branding wave.
    - run-as-non-root
    - sensitive-host-mounts
    - ssh-port
    - unsafe-proc-mount
    - unsafe-sysctls
    - unset-cpu-requirements
    - unset-memory-requirements
    - use-namespace
    - wildcard-in-rules
    - writable-host-mount

customChecks: []
