name: Helm chart install test

# Real chart install on a kind cluster. Pairs with helm-lint.yml:
# - helm-lint.yml: structural (ct lint + helm template + kubeconform)
# - this:          functional (kind + ct install + manager pod ready)
#
# Runs only on chart-touching PRs and weekly. ~5-10 min wall-time.

on:
  pull_request:
    paths:
      - 'deploy/chart/**'
      - 'config/**'
      - 'Dockerfile'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/helm-install-test.yml'
  schedule:
    - cron: '11 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  install:
    name: ct install (kind)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
        with:
          version: latest

      - uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0

      - uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          cluster_name: chart-install-test
          # Pin to a recent stable node image that satisfies the chart's
          # `kubeVersion: ">=1.29.0-0"` floor. Bump with the Chart.yaml floor.
          node_image: kindest/node:v1.31.4

      - name: Build + load operator image
        env:
          IMG: ghcr.io/keiailab/qdrant-operator:ct-install
        run: |
          make docker-build IMG="$IMG"
          kind load docker-image "$IMG" --name chart-install-test

      - name: Pre-create chart install namespace
        # ct install with --namespace does NOT auto-create the
        # namespace; create it explicitly so the chart install does
        # not race with namespace creation.
        run: |
          kubectl create namespace qdrant-operator-system \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: ct install (chart functional test)
        env:
          IMG: ghcr.io/keiailab/qdrant-operator:ct-install
        run: |
          # Override the image to the locally-built+loaded one. The
          # qdrant-operator chart has no webhook / cert-manager / metrics
          # dependency, so this verifies the core install + Pod Ready
          # (CRDs, RBAC, leader-election, controller-manager Deployment).
          ct install \
            --target-branch=main \
            --charts deploy/chart \
            --namespace=qdrant-operator-system \
            --helm-extra-set-args="\
              --set=image.repository=ghcr.io/keiailab/qdrant-operator \
              --set=image.tag=ct-install \
              --set=image.pullPolicy=IfNotPresent"

      - name: Show operator pod state on failure
        if: failure()
        run: |
          echo "=== pods ==="
          kubectl get pods -A -o wide || true
          echo "=== operator logs ==="
          kubectl -n qdrant-operator-system logs -l control-plane=controller-manager --tail=200 || true
          echo "=== events ==="
          kubectl get events -A --sort-by=.lastTimestamp | tail -30 || true
