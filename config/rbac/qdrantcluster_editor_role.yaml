# This rule is not used by the project qdrant-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the qdrant.keiailab.com.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: qdrant-operator
    app.kubernetes.io/managed-by: kustomize
  name: qdrantcluster-editor-role
rules:
- apiGroups:
  - qdrant.keiailab.com
  resources:
  - qdrantclusters
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - qdrant.keiailab.com
  resources:
  - qdrantclusters/status
  verbs:
  - get
