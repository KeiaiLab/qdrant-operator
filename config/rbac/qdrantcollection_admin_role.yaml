# This rule is not used by the project qdrant-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over qdrant.keiailab.com.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: qdrant-operator
    app.kubernetes.io/managed-by: kustomize
  name: qdrantcollection-admin-role
rules:
- apiGroups:
  - qdrant.keiailab.com
  resources:
  - qdrantcollections
  verbs:
  - '*'
- apiGroups:
  - qdrant.keiailab.com
  resources:
  - qdrantcollections/status
  verbs:
  - get
