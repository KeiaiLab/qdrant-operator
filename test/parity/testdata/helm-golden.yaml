        - mountPath: /qdrant/init
          name: qdrant-init
      initContainers: null
      securityContext:
        fsGroup: 3000
        fsGroupChangePolicy: Always
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: platform-data-qdrant
      volumes:
      - configMap:
