# Source: qdrant/charts/qdrant/templates/configmap.yaml
apiVersion: v1
data:
  initialize.sh: |
    #!/bin/sh
    echo "Soft limits"
    ulimit -a -S
    echo "Hard limits"
    ulimit -a -H
    ulimit -n $(ulimit -Hn)
    SET_INDEX=${HOSTNAME##*-}
    echo "Starting initializing for pod $SET_INDEX"
    if [ "$SET_INDEX" = "0" ]; then
      exec ./entrypoint.sh --uri 'http://platform-data-qdrant-0.platform-data-qdrant-headless:6335'
    else
      exec ./entrypoint.sh --bootstrap 'http://platform-data-qdrant-0.platform-data-qdrant-headless:6335' --uri 'http://platform-data-qdrant-'"$SET_INDEX"'.platform-data-qdrant-headless:6335'
    fi
  production.yaml: |
    cluster:
      consensus:
        tick_period_ms: 100
      enabled: true
      p2p:
        enable_tls: false
        port: 6335
    service:
      enable_tls: false
kind: ConfigMap
